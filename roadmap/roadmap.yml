              Monaco using monaco-editor decorations API.
            depends_on: [TASK-031]
            attempt_count: 0
            task_acceptance:
              - "Two tabs in two windows see each other's cursor positions live."
          - id: TASK-034
            title: "File-lock acquire/release + read-only Monaco when locked"
            status: ready
            priority: high
            complexity: medium
            workspaces: ["apps/web", "services/orchestrator"]
