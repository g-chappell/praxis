name: Build sandbox base image

# The per-project sandbox base image (praxis-sandbox-base:latest) is a LOCAL
# image on the VPS that DockerSandbox creates containers from — it isn't pulled
# from a registry. It used to be built by hand, so it silently went stale (a
# missing claude-agent-acp adapter broke STORY-09). This rebuilds it on the VPS
# whenever its Dockerfile/context changes. New sessions pick up the new image
# automatically (existing containers keep theirs until recreated).

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/docker/sandbox-base/**'
      - '.github/workflows/build-sandbox-base.yml'
  workflow_dispatch:

concurrency:
  group: build-sandbox-base
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the build context to the VPS and build there (the image is local to
      # the VPS, not a registry). Retried: the dial to the VPS intermittently
      # times out from GitHub-hosted runners.
      - name: Rebuild sandbox base image on the VPS
        uses: nick-fields/retry@v3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        with:
          timeout_minutes: 12
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
            SSHOPTS="-i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
            TARGET="$VPS_USER@$VPS_HOST"
            ssh $SSHOPTS "$TARGET" 'rm -rf /tmp/praxis-sbx-base && mkdir -p /tmp/praxis-sbx-base'
            scp $SSHOPTS -r infrastructure/docker/sandbox-base/. "$TARGET:/tmp/praxis-sbx-base/"
            ssh $SSHOPTS "$TARGET" \
              'docker build -t praxis-sandbox-base:latest /tmp/praxis-sbx-base && rm -rf /tmp/praxis-sbx-base'

      - name: Summary
        if: always()
        run: echo "::notice title=Sandbox base::praxis-sandbox-base:latest rebuilt on the VPS for ${{ github.sha }}"
