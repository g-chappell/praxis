name: Build sandbox base image

# The per-project sandbox base image (praxis-sandbox-base:latest) is a LOCAL
# image on the VPS that DockerSandbox creates containers from — it isn't pulled
# from a registry. It used to be built by hand, so it silently went stale (a
# missing claude-agent-acp adapter broke STORY-09). This rebuilds it on the VPS
# whenever its Dockerfile/context changes. New sessions pick up the new image
# automatically (existing containers keep theirs until recreated).

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/docker/sandbox-base/**'
      - '.github/workflows/build-sandbox-base.yml'
  workflow_dispatch:

concurrency:
  group: build-sandbox-base
  cancel-in-progress: false

jobs:
  # Runs on the VPS via the self-hosted runner: the image is local to the VPS
  # (not a registry), so it builds where it lives — no SSH/scp, which also
  # sidesteps the intermittent GitHub-runner→VPS path loss (#142/#143).
  build:
    runs-on: [self-hosted, praxis-vps]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild sandbox base image
        run: docker build -t praxis-sandbox-base:latest infrastructure/docker/sandbox-base

      - name: Summary
        if: always()
        run: echo "::notice title=Sandbox base::praxis-sandbox-base:latest rebuilt on the VPS for ${{ github.sha }}"
