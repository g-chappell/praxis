name: Deploy orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'services/orchestrator/**'
      - 'packages/db/**'
      - 'infrastructure/deploy/praxis-orchestrator.service'
      - '.github/workflows/deploy-orchestrator.yml'
  workflow_dispatch:

# Per-workflow group so overlapping orchestrator deploys queue. Do NOT share
# one group across the deploy workflows: GitHub keeps only one in-progress +
# one pending per group, so a shared group cancels legitimate concurrent
# service deploys (#142). The SSH-reachability flake is handled by the retry
# below, not by serialization.
concurrency:
  group: deploy-orchestrator
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/g-chappell/praxis-orchestrator
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Embed the commit SHA into the image so /health reports it.
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH to the VPS to restart the service. Retried: the dial to the VPS
      # blackholes from GitHub-hosted runners in multi-minute windows (no
      # SYN-ACK), even though the image built + pushed fine. ~10 attempts x 45s
      # (~10 min) rides out an observed ~4 min blackout; each failed dial costs
      # only ConnectTimeout=20s so attempts cycle fast.
      - name: Restart praxis-orchestrator on VPS
        uses: nick-fields/retry@v3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        with:
          timeout_minutes: 3
          max_attempts: 10
          retry_wait_seconds: 45
          command: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
            ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
              "$VPS_USER@$VPS_HOST" 'sudo systemctl restart praxis-orchestrator.service'

      - name: Smoke test
        run: |
          bash scripts/healthcheck.sh "https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }}/health" 60

      - name: Summary
        if: always()
        run: |
          echo "::notice title=Deployed::https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }} now serves the build for commit ${{ github.sha }}"
