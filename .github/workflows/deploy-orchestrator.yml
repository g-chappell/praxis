name: Deploy orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'services/orchestrator/**'
      - 'packages/db/**'
      - 'infrastructure/deploy/praxis-orchestrator.service'
      - '.github/workflows/deploy-orchestrator.yml'
  workflow_dispatch:

concurrency:
  group: deploy-orchestrator
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/g-chappell/praxis-orchestrator
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Embed the commit SHA into the image so /health reports it.
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restart praxis-orchestrator on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            sudo systemctl restart praxis-orchestrator.service

      - name: Smoke test
        run: |
          bash scripts/healthcheck.sh "https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }}/health" 60

      - name: Summary
        if: always()
        run: |
          echo "::notice title=Deployed::https://${{ vars.API_DOMAIN || 'api.praxis.blacksail.dev' }} now serves the build for commit ${{ github.sha }}"
