name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref
# (amend-pushes, force-pushes, branch updates) so we don't burn CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate roadmap
        run: node roadmap/validate.mjs

      - name: Check rendered ROADMAP.md is up to date
        run: |
          node roadmap/render.mjs
          git diff --exit-code -- ROADMAP.md || {
            echo "::error::ROADMAP.md is out of date. Run 'node roadmap/render.mjs' and commit." >&2
            exit 1
          }

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r --if-present build

      # Validate the deploy artefacts. Caddy is not on the runner image by
      # default; install it from the official apt repo (~10s). systemd-analyze
      # ships with the runner.
      - name: Install Caddy (for validation)
        run: |
          curl -fsSL 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -fsSL 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y caddy >/dev/null

      - name: Validate Caddyfile
        run: caddy validate --config infrastructure/caddy/Caddyfile --adapter caddyfile

      - name: Validate systemd unit
        run: systemd-analyze verify infrastructure/deploy/praxis-web.service
