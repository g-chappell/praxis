name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate roadmap
        run: node roadmap/validate.mjs

      - name: Check rendered ROADMAP.md is up to date
        run: |
          node roadmap/render.mjs
          git diff --exit-code -- ROADMAP.md || {
            echo "::error::ROADMAP.md is out of date. Run 'node roadmap/render.mjs' and commit." >&2
            exit 1
          }

      - name: Detect package.json
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pkg=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v3
        if: steps.detect.outputs.has_pkg == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_pkg == 'true'
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm -r --if-present typecheck

      - name: Test
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm test

      - name: Build
        if: steps.detect.outputs.has_pkg == 'true'
        run: pnpm -r --if-present build
