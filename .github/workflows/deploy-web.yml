name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'infrastructure/deploy/praxis-web.service'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# Queue overlapping deploys rather than cancel. A second deploy starting while
# the first is mid-restart could race the systemd unit; the queue keeps it
# linear.
concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/g-chappell/praxis-web
          # Three tags every build:
          #   :latest    — what the systemd unit pulls
          #   :sha-<7c>  — exact commit, enables `docker tag :sha-X :latest` rollback
          #   :main      — branch ref, conventional
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache so subsequent deploys reuse the deps layer.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restart praxis-web on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          # The systemd unit's ExecStartPre runs `docker pull` as root before
          # the container starts, so a single restart is enough — no need to
          # pull manually from the deploy user.
          script: |
            sudo systemctl restart praxis-web.service

      - name: Smoke test
        run: |
          bash scripts/healthcheck.sh "https://${{ vars.WEB_DOMAIN }}/api/health" 60

      - name: Summary
        if: always()
        run: |
          echo "::notice title=Deployed::https://${{ vars.WEB_DOMAIN }} now serves the build for commit ${{ github.sha }}"
