name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'infrastructure/deploy/praxis-web.service'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# Queue overlapping deploys rather than cancel. A second deploy starting while
# the first is mid-restart could race the systemd unit; the queue keeps it
# linear.
concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/g-chappell/praxis-web
          # Three tags every build:
          #   :latest    — what the systemd unit pulls
          #   :sha-<7c>  — exact commit, enables `docker tag :sha-X :latest` rollback
          #   :main      — branch ref, conventional
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache so subsequent deploys reuse the deps layer.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH to the VPS to restart the service. Retried: the dial to the VPS
      # intermittently times out from GitHub-hosted runners. The systemd unit's
      # ExecStartPre runs `docker pull` as root, so one restart is enough.
      - name: Restart praxis-web on VPS
        uses: nick-fields/retry@v3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        with:
          timeout_minutes: 3
          max_attempts: 4
          retry_wait_seconds: 15
          command: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
            ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
              "$VPS_USER@$VPS_HOST" 'sudo systemctl restart praxis-web.service'

      - name: Smoke test
        run: |
          bash scripts/healthcheck.sh "https://${{ vars.WEB_DOMAIN }}/api/health" 60

      - name: Summary
        if: always()
        run: |
          echo "::notice title=Deployed::https://${{ vars.WEB_DOMAIN }} now serves the build for commit ${{ github.sha }}"
